<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>interview-helper</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #14161a; color: #e6e6e6;
         display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; gap: 10px; align-items: center; padding: 12px 16px;
           background: #1c1f26; border-bottom: 1px solid #2b2f38; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0 12px 0 0; font-weight: 600; }
  select, input[type=text] { background: #14161a; color: #e6e6e6; border: 1px solid #3a3f4b;
           border-radius: 6px; padding: 6px 8px; }
  input[type=text] { width: 260px; }
  button { border: 0; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-weight: 600; }
  #start { background: #2f9e5f; color: #fff; }
  #stop  { background: #b3423f; color: #fff; }
  #report { background: #3d5a99; color: #fff; }
  #vacancy { background: transparent; border: 1px solid #3a3f4b; color: #b8bec8; }
  #vacancy.loaded { border-color: #2f9e5f; color: #7fd39a; }
  #vacancyModal { position: fixed; inset: 0; background: rgba(0,0,0,.6);
                  display: none; align-items: center; justify-content: center; }
  #vacancyModal.open { display: flex; }
  #vacancyModal .box { background: #1c1f26; border: 1px solid #2b2f38; border-radius: 12px;
                       padding: 16px; width: min(720px, 92vw); display: flex;
                       flex-direction: column; gap: 10px; }
  #vacancyModal textarea { height: 50vh; background: #14161a; color: #e6e6e6;
                           border: 1px solid #3a3f4b; border-radius: 8px; padding: 10px;
                           font: 13px/1.4 ui-monospace, monospace; resize: vertical; }
  #vacancyModal .row { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
  #vacancyModal .hint { margin-right: auto; color: #8a919e; font-size: 12px; }
  #vacancyModal .tabs { display: flex; gap: 6px; }
  #vacancyModal .tab { background: transparent; border: 1px solid #3a3f4b; color: #8a919e;
                       border-radius: 8px; padding: 5px 14px; font-weight: 600; }
  #vacancyModal .tab.active { background: #14161a; color: #e6e6e6; border-color: #4a6da7; }
  #vacancySave { background: #2f9e5f; color: #fff; }
  #vacancyClose { background: #2b2f38; color: #e6e6e6; }
  .answer.report-card { border-color: #6b5b95; background: #221e2e; }
  button:disabled { opacity: .45; cursor: default; }
  #status { margin-left: auto; color: #8a919e; font-size: 13px; }
  header label { font-size: 13px; color: #b8bec8; display: flex; align-items: center; gap: 4px; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
         background: #2b2f38; overflow: hidden; }
  section { background: #14161a; overflow-y: auto; padding: 14px 16px; }
  section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
               color: #8a919e; margin: 0 0 10px; position: sticky; top: -14px;
               background: #14161a; padding: 6px 0; }
  .utt { margin: 6px 0; }
  .utt .who { font-weight: 700; margin-right: 6px; }
  .utt .ask { margin-left: 8px; padding: 0 7px; font-size: 12px; line-height: 18px;
              background: transparent; border: 1px solid #3a3f4b; color: #8ab4f8;
              border-radius: 9px; opacity: 0; transition: opacity .15s; }
  .utt:hover .ask { opacity: 1; }
  .utt .ask:hover { background: #1c2430; border-color: #4a6da7; }
  .utt.loopback .who { color: #e06c5f; }
  .utt.mic .who { color: #58b368; }
  .answer { background: #1c2430; border: 1px solid #2c3b52; border-radius: 10px;
            padding: 10px 12px; margin: 10px 0; white-space: pre-wrap; }
  .answer .q { color: #8ab4f8; font-size: 13px; margin-bottom: 6px; }
  .answer.streaming { border-color: #4a6da7; }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>interview-helper</h1>
  <select id="mode">
    <option value="live">живая сессия</option>
    <option value="file">из файла</option>
  </select>
  <input id="path" type="text" placeholder="tests/fixtures/question.wav" hidden>
  <select id="model">
    <option>base</option>
    <option selected>small</option>
    <option>medium</option>
  </select>
  <select id="lang" title="Язык сессии">
    <option value="">язык: авто</option>
    <option value="ru">язык: русский</option>
    <option value="en">язык: английский</option>
  </select>
  <select id="answerModel" title="Модель для ответов">
    <option value="haiku">ответы: haiku</option>
    <option value="sonnet" selected>ответы: sonnet</option>
    <option value="opus">ответы: opus</option>
  </select>
  <select id="effort" title="Effort (haiku не поддерживает, opus не выше medium)"></select>
  <select id="mic" title="Микрофон"></select>
  <select id="loopback" title="Звук системы (loopback)"></select>
  <label title="Отладка: обычно вопросы приходят только из звука встречи">
    <input type="checkbox" id="answerMic"> отвечать на мой микрофон
  </label>
  <button id="start">Старт</button>
  <button id="stop" disabled>Стоп</button>
  <button id="report" title="Отчёт по последней сессии">Отчёт</button>
  <button id="vacancy" title="Вакансия и резюме для контекста ответов">Контекст</button>
  <span id="status">не запущено</span>
</header>
<div id="vacancyModal">
  <div class="box">
    <div class="tabs">
      <button class="tab active" data-tab="vacancy">Вакансия</button>
      <button class="tab" data-tab="resume">Резюме</button>
    </div>
    <textarea id="vacancyText" placeholder="Вставьте текст (markdown или обычный). Пустой текст удаляет файл."></textarea>
    <div class="row">
      <span class="hint">Сохраняется в context/; подхватывается при следующем старте сессии.</span>
      <button id="vacancyClose">Отмена</button>
      <button id="vacancySave">Сохранить</button>
    </div>
  </div>
</div>
<main>
  <section id="transcript-pane"><h2>Транскрипт</h2><div id="transcript"></div></section>
  <section id="answers-pane"><h2>Ответы</h2><div id="answers"></div></section>
</main>
<script>
const $ = id => document.getElementById(id);
const answerCards = {};

const EFFORTS = { haiku: [], sonnet: ["low", "medium", "high", "xhigh", "max"], opus: ["low", "medium"] };
function fillEffort() {
  const model = $("answerModel").value;
  const sel = $("effort");
  const prev = sel.value;
  sel.innerHTML = "";
  const levels = EFFORTS[model];
  if (!levels.length) { sel.add(new Option("effort: —", "")); sel.disabled = true; return; }
  sel.disabled = false;
  sel.add(new Option("effort: по умолч.", ""));
  const want = levels.includes(prev) ? prev : "low"; // sonnet-low — фаворит по скорость/качество
  for (const l of levels) sel.add(new Option(`effort: ${l}`, l, l === want, l === want));
}
$("answerModel").onchange = fillEffort;
fillEffort();

$("mode").onchange = () => {
  const isFile = $("mode").value === "file";
  $("path").hidden = !isFile;
  $("mic").hidden = $("loopback").hidden = isFile;
};

(async () => {
  const devs = await (await fetch("/api/devices")).json();
  const fill = (sel, list, label) => {
    sel.innerHTML = "";
    if (!list.length) { sel.add(new Option(`${label}: нет устройств`, "")); return; }
    for (const d of list) {
      const name = d.name.length > 40 ? d.name.slice(0, 40) + "…" : d.name;
      sel.add(new Option(`${label}: ${name}`, d.index, d.default, d.default));
    }
  };
  fill($("mic"), devs.mic, "🎤");
  fill($("loopback"), devs.loopback, "🔊");
})();

$("start").onclick = async () => {
  const body = {
    mode: $("mode").value, path: $("path").value || null, model: $("model").value,
    mic_device: $("mic").value ? +$("mic").value : null,
    loopback_device: $("loopback").value ? +$("loopback").value : null,
    language: $("lang").value || null,
    answer_mic: $("answerMic").checked,
    answer_model: $("answerModel").value,
    effort: $("effort").value || null,
  };
  const r = await (await fetch("/api/start", { method: "POST",
    headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })).json();
  if (!r.ok) { $("status").textContent = r.error; return; }
  $("start").disabled = true; $("stop").disabled = false;
};

$("stop").onclick = async () => { await fetch("/api/stop", { method: "POST" }); };

const ctxState = { vacancy: "", resume: "" };
let ctxTab = "vacancy";

async function refreshContextBadge() {
  const r = await (await fetch("/api/context")).json();
  ctxState.vacancy = r.vacancy; ctxState.resume = r.resume;
  const loaded = [r.vacancy.trim() && "вакансия", r.resume.trim() && "резюме"].filter(Boolean);
  $("vacancy").classList.toggle("loaded", loaded.length > 0);
  $("vacancy").textContent = loaded.length ? `Контекст: ${loaded.join(" + ")}` : "Контекст";
}
refreshContextBadge();

function switchTab(tab) {
  ctxState[ctxTab] = $("vacancyText").value;
  ctxTab = tab;
  document.querySelectorAll("#vacancyModal .tab").forEach(
    b => b.classList.toggle("active", b.dataset.tab === tab));
  $("vacancyText").value = ctxState[tab];
  $("vacancyText").focus();
}
document.querySelectorAll("#vacancyModal .tab").forEach(b => b.onclick = () => switchTab(b.dataset.tab));

$("vacancy").onclick = async () => {
  await refreshContextBadge();
  $("vacancyText").value = ctxState[ctxTab];
  $("vacancyModal").classList.add("open");
  $("vacancyText").focus();
};
$("vacancyClose").onclick = () => $("vacancyModal").classList.remove("open");
$("vacancySave").onclick = async () => {
  ctxState[ctxTab] = $("vacancyText").value;
  await fetch("/api/context", { method: "POST",
    headers: { "Content-Type": "application/json" }, body: JSON.stringify(ctxState) });
  $("vacancyModal").classList.remove("open");
  await refreshContextBadge();
  $("status").textContent = "Контекст сохранён — подхватится при следующем старте сессии";
};

let reportCard = null;
$("report").onclick = async () => {
  const r = await (await fetch("/api/report", { method: "POST" })).json();
  if (!r.ok) { $("status").textContent = r.error; return; }
  $("report").disabled = true;
};

function scrollDown(el) { el.parentElement.scrollTop = el.parentElement.scrollHeight; }

new EventSource("/api/events").onmessage = e => {
  const ev = JSON.parse(e.data);
  if (ev.type === "status") {
    $("status").textContent = ev.text;
    if (ev.text === "Остановлено") { $("start").disabled = false; $("stop").disabled = true; }
  } else if (ev.type === "utterance") {
    const d = document.createElement("div");
    d.className = "utt " + ev.source;
    const who = ev.source === "loopback" ? "интервьюер" : "я";
    d.innerHTML = `<span class="who">${who}:</span>`;
    d.append(ev.text);
    const btn = document.createElement("button");
    btn.className = "ask"; btn.textContent = "→ LLM"; btn.title = "Ответить на эту реплику";
    btn.onclick = () => fetch("/api/ask", { method: "POST",
      headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: ev.text }) });
    d.append(btn);
    $("transcript").append(d); scrollDown($("transcript"));
  } else if (ev.type === "answer_start") {
    const card = document.createElement("div");
    card.className = "answer streaming";
    const q = document.createElement("div"); q.className = "q"; q.textContent = ev.question;
    const t = document.createElement("div"); t.className = "t";
    card.append(q, t);
    answerCards[ev.id] = card;
    $("answers").append(card); scrollDown($("answers"));
  } else if (ev.type === "answer_delta" && answerCards[ev.id]) {
    answerCards[ev.id].querySelector(".t").append(ev.text); scrollDown($("answers"));
  } else if (ev.type === "answer_end" && answerCards[ev.id]) {
    answerCards[ev.id].classList.remove("streaming"); delete answerCards[ev.id];
  } else if (ev.type === "report_start") {
    reportCard = document.createElement("div");
    reportCard.className = "answer report-card streaming";
    const q = document.createElement("div"); q.className = "q";
    q.textContent = `Отчёт по ${ev.transcript}`;
    const t = document.createElement("div"); t.className = "t";
    reportCard.append(q, t);
    $("answers").append(reportCard); scrollDown($("answers"));
  } else if (ev.type === "report_delta" && reportCard) {
    reportCard.querySelector(".t").append(ev.text); scrollDown($("answers"));
  } else if (ev.type === "report_end") {
    if (reportCard) { reportCard.classList.remove("streaming"); reportCard = null; }
    $("status").textContent = `Отчёт сохранён: ${ev.path}`;
    $("report").disabled = false;
  }
};
</script>
</body>
</html>
