<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>interview-helper</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #14161a; color: #e6e6e6;
         display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; gap: 10px; align-items: center; padding: 12px 16px;
           background: #1c1f26; border-bottom: 1px solid #2b2f38; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0 12px 0 0; font-weight: 600; }
  select, input[type=text] { background: #14161a; color: #e6e6e6; border: 1px solid #3a3f4b;
           border-radius: 6px; padding: 6px 8px; }
  input[type=text] { width: 260px; }
  button { border: 0; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-weight: 600; }
  #start { background: #2f9e5f; color: #fff; }
  #stop  { background: #b3423f; color: #fff; }
  button:disabled { opacity: .45; cursor: default; }
  #status { margin-left: auto; color: #8a919e; font-size: 13px; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
         background: #2b2f38; overflow: hidden; }
  section { background: #14161a; overflow-y: auto; padding: 14px 16px; }
  section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
               color: #8a919e; margin: 0 0 10px; position: sticky; top: -14px;
               background: #14161a; padding: 6px 0; }
  .utt { margin: 6px 0; }
  .utt .who { font-weight: 700; margin-right: 6px; }
  .utt.loopback .who { color: #e06c5f; }
  .utt.mic .who { color: #58b368; }
  .answer { background: #1c2430; border: 1px solid #2c3b52; border-radius: 10px;
            padding: 10px 12px; margin: 10px 0; white-space: pre-wrap; }
  .answer .q { color: #8ab4f8; font-size: 13px; margin-bottom: 6px; }
  .answer.streaming { border-color: #4a6da7; }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>interview-helper</h1>
  <select id="mode">
    <option value="live">живая сессия</option>
    <option value="file">из файла</option>
  </select>
  <input id="path" type="text" placeholder="tests/fixtures/question.wav" hidden>
  <select id="model">
    <option>base</option>
    <option selected>small</option>
    <option>medium</option>
  </select>
  <select id="mic" title="Микрофон"></select>
  <select id="loopback" title="Звук системы (loopback)"></select>
  <button id="start">Старт</button>
  <button id="stop" disabled>Стоп</button>
  <span id="status">не запущено</span>
</header>
<main>
  <section id="transcript-pane"><h2>Транскрипт</h2><div id="transcript"></div></section>
  <section id="answers-pane"><h2>Ответы</h2><div id="answers"></div></section>
</main>
<script>
const $ = id => document.getElementById(id);
let currentAnswer = null;

$("mode").onchange = () => {
  const isFile = $("mode").value === "file";
  $("path").hidden = !isFile;
  $("mic").hidden = $("loopback").hidden = isFile;
};

(async () => {
  const devs = await (await fetch("/api/devices")).json();
  const fill = (sel, list, label) => {
    sel.innerHTML = "";
    if (!list.length) { sel.add(new Option(`${label}: нет устройств`, "")); return; }
    for (const d of list) {
      const name = d.name.length > 40 ? d.name.slice(0, 40) + "…" : d.name;
      sel.add(new Option(`${label}: ${name}`, d.index, d.default, d.default));
    }
  };
  fill($("mic"), devs.mic, "🎤");
  fill($("loopback"), devs.loopback, "🔊");
})();

$("start").onclick = async () => {
  const body = {
    mode: $("mode").value, path: $("path").value || null, model: $("model").value,
    mic_device: $("mic").value ? +$("mic").value : null,
    loopback_device: $("loopback").value ? +$("loopback").value : null,
  };
  const r = await (await fetch("/api/start", { method: "POST",
    headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })).json();
  if (!r.ok) { $("status").textContent = r.error; return; }
  $("start").disabled = true; $("stop").disabled = false;
};

$("stop").onclick = async () => { await fetch("/api/stop", { method: "POST" }); };

function scrollDown(el) { el.parentElement.scrollTop = el.parentElement.scrollHeight; }

new EventSource("/api/events").onmessage = e => {
  const ev = JSON.parse(e.data);
  if (ev.type === "status") {
    $("status").textContent = ev.text;
    if (ev.text === "Остановлено") { $("start").disabled = false; $("stop").disabled = true; }
  } else if (ev.type === "utterance") {
    const d = document.createElement("div");
    d.className = "utt " + ev.source;
    const who = ev.source === "loopback" ? "интервьюер" : "я";
    d.innerHTML = `<span class="who">${who}:</span>`;
    d.append(ev.text);
    $("transcript").append(d); scrollDown($("transcript"));
  } else if (ev.type === "answer_start") {
    currentAnswer = document.createElement("div");
    currentAnswer.className = "answer streaming";
    const q = document.createElement("div"); q.className = "q"; q.textContent = ev.question;
    const t = document.createElement("div"); t.className = "t";
    currentAnswer.append(q, t);
    $("answers").append(currentAnswer); scrollDown($("answers"));
  } else if (ev.type === "answer_delta" && currentAnswer) {
    currentAnswer.querySelector(".t").append(ev.text); scrollDown($("answers"));
  } else if (ev.type === "answer_end" && currentAnswer) {
    currentAnswer.classList.remove("streaming"); currentAnswer = null;
  }
};
</script>
</body>
</html>
